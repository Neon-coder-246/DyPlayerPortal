<!DOCTYPE html>
<html>
<head>
  <title>DyPlayer Portal</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:40px; }
    .box { background:#222; padding:20px; border-radius:10px; width:350px; }
    input { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none; }
    button { width:100%; padding:12px; background:#4caf50; border:none; border-radius:6px; color:white; font-size:16px; cursor:pointer; }
    button:hover { background:#45a049; }
    #status { margin-top:15px; font-size:14px; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Update Playlist</h2>

    <label>MAC Address</label>
    <input id="mac" placeholder="23:4b:21:11">

    <label>Playlist Link</label>
    <input id="playlist" placeholder="https://gist.github.com/...">

    <button onclick="upload()">Update</button>

    <div id="status"></div>
  </div>

  <script>
    async function upload() {
      const mac = document.getElementById("mac").value.trim();
      const playlist = document.getElementById("playlist").value.trim();
      const status = document.getElementById("status");

      if (!mac || !playlist) {
        status.innerHTML = "❌ Please enter both MAC and playlist link";
        return;
      }

      const res = await fetch("https://ulotqqmucsdeoaslgaov.supabase.co/functions/v1/portal/admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mac, playlist })
      });

      const data = await res.json();

      if (data.ok) {
        status.innerHTML = "✅ Playlist updated for MAC: " + mac;
      } else {
        status.innerHTML = "❌ Error: " + (data.error || "Unknown error");
      }
    }
  </script>

</body>
</html>
